  <text x="44" y="223" fill="#8a8a8a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">1. Pick how you want to sign in</text>
  <text x="44" y="242" fill="#8a8a8a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">2. Choose solo or shared setup</text>

