  <text x="112" y="343" fill="#0a0a0a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700">Continue with Google</text>

  <rect x="28" y="378" width="334" height="56" rx="8" fill="#1b1b1b" stroke="#2b2b2b"/>
  <text x="118" y="413" fill="#f5f5f5" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700">Continue with Apple</text>

