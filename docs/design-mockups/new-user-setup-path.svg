<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="390" height="844" fill="#0a0a0a"/>

  <text x="28" y="74" fill="#666666" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" letter-spacing="1.2">STEP 1 OF 2</text>
  <text x="28" y="116" fill="#f5f5f5" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="700">How are you starting?</text>
  <text x="28" y="144" fill="#8a8a8a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">Pick the path that matches how you want to use Adlo right now.</text>

  <rect x="28" y="198" width="334" height="126" rx="10" fill="#f5f5f5"/>
  <text x="46" y="228" fill="#0a0a0a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700">Track solo</text>
  <text x="46" y="252" fill="#333333" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">Start with your own expenses, budget, and reminders.</text>
  <text x="46" y="273" fill="#333333" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">You can invite a household later if you want to share.</text>
  <rect x="46" y="289" width="92" height="24" rx="12" fill="#e8e8e8"/>
  <text x="62" y="305" fill="#0a0a0a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600">Fastest start</text>

  <rect x="28" y="342" width="334" height="126" rx="10" fill="#111111" stroke="#1a1a1a"/>
  <text x="46" y="372" fill="#f5f5f5" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700">Create a household</text>
  <text x="46" y="396" fill="#8a8a8a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">For couples, families, or roommates starting fresh together.</text>
  <text x="46" y="417" fill="#8a8a8a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">You will name it first, then invite people when you are ready.</text>
  <rect x="46" y="433" width="128" height="24" rx="12" fill="#1c1c1c"/>
  <text x="62" y="449" fill="#d5d5d5" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600">Best for shared setup</text>

  <rect x="28" y="486" width="334" height="126" rx="10" fill="#111111" stroke="#1a1a1a"/>
  <text x="46" y="516" fill="#f5f5f5" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700">Join a household</text>
  <text x="46" y="540" fill="#8a8a8a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">Use an invite code from someone who already started the shared setup.</text>
  <text x="46" y="561" fill="#8a8a8a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">You will still get your own quick-start checklist after joining.</text>

  <rect x="28" y="670" width="334" height="56" rx="8" fill="#111111" stroke="#1a1a1a"/>
  <text x="46" y="703" fill="#b5b5b5" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">Not sure yet? Start solo and change later.</text>
</svg>
