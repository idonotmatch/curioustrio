services:
  postgres-test:
    image: postgres:16-alpine
    container_name: curious-trio-test-db
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d postgres"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - curious-trio-test-db-data:/var/lib/postgresql/data

volumes:
  curious-trio-test-db-data:
